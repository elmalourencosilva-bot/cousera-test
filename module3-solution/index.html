<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Module 3 Solution - Food, LLC</title>
    
    <!-- Bootstrap CSS (v3) -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <!-- Seus estilos personalizados -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Barra de Navegação (Não fixa/static) -->
  <nav class="navbar navbar-default navbar-static-top">
    <div class="container-fluid">
      <div class="navbar-header">
        <!-- Botão Hambúrguer (Apenas visível no xs / mobile) -->
        <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#main-navbar-collapse" aria-expanded="false">
          <span class="sr-only">Toggle navigation</span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
        </button>
        <!-- Nome da Empresa -->
        <a class="navbar-brand" href="#">Food, LLC</a>
      </div>

      <!-- Menu que colapsa (Apenas abre no mobile) -->
      <div class="collapse navbar-collapse" id="main-navbar-collapse">
        <!-- Classe visible-xs garante que estes itens SÓ apareçam no mobile -->
        <ul class="nav navbar-nav visible-xs text-center">
          <li><a href="#">Frango</a></li>
          <li><a href="#">Carne</a></li>
          <li><a href="#">Sushi</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Conteúdo Principal -->
  <main class="container-fluid">
    <!-- Título Centralizado com classe Bootstrap -->
    <h1 class="text-center">Nosso Menu</h1>

    <!-- Grid do Bootstrap ocupando a largura total (col-xs-12) -->
    <div class="row">
      <div class="col-xs-12">
        <section class="main-content-box">
          <p class="text-center">Role a página para baixo para testar a barra de navegação estática.</p>
          <!-- Texto longo ou altura definida por CSS para forçar a rolagem -->
          <div style="height: 1200px;"></div>
          <p class="text-center">Fim da seção de conteúdo!</p>
        </section>
      </div>
    </div>
  </main>

  <!-- Arquivos JavaScript necessários para o funcionamento do menu colapsável -->
  <script src="js/jquery-2.1.4.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
</body>
</html>
